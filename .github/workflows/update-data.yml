name: Update NBA Data

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Instalar e arrancar Tor
        run: |
          sudo apt-get install -y tor
          sudo service tor start
          sleep 10

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install nba_api requests pandas requests[socks]

      - name: Correr script de atualização
        run: python update_data.py
        env:
          HTTP_PROXY: socks5h://127.0.0.1:9050
          HTTPS_PROXY: socks5h://127.0.0.1:9050

      - name: Commit e push dos JSONs atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/app/data/*.json
          git diff --cached --quiet || git commit -m "chore: atualizar dados NBA [$(date +'%Y-%m-%d')]"
          git push